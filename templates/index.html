{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-8">
        <h2>Configured Models</h2>
        <div class="list-group">
            {% for model in models %}
            <div class="list-group-item d-flex justify-content-between align-items-center">
                {{ model.name }}
                <div>
                    <a href="{{ url_for('start_model', model_id=loop.index0) }}"
                       class="btn btn-sm btn-primary" title="Start">
                        <i class="bi bi-play-fill"></i>
                    </a>
                    <a href="{{ url_for('copy_model', model_id=loop.index0) }}"
                       class="btn btn-sm btn-info ms-1" title="Copy">
                        <i class="bi bi-copy"></i>
                    </a>
                    <a href="{{ url_for('edit_model', model_id=loop.index0) }}"
                       class="btn btn-sm btn-secondary ms-1" title="Edit">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <form action="{{ url_for('delete_model', model_id=loop.index0) }}"
                          method="POST" style="display: inline;"
                          onsubmit="return confirm('Delete this model?');">
                        <button type="submit" class="btn btn-sm btn-danger ms-1" title="Delete">
                            <i class="bi bi-trash"></i>
                        </button>
                    </form>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
    <div class="col-md-4">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Current Model</h5>
                {% if current_process %}
                <p class="card-text">Running: {{ models[current_model_id].name }}</p>
                <a href="{{ url_for('stop_model') }}" class="btn btn-danger mb-2">Stop</a>
                {% else %}
                <p class="card-text">No model running</p>
                {% endif %}
                <a href="{{ url_for('config') }}" class="btn btn-secondary mb-2">Add Model</a>
                <a href="{{ url_for('view_logs') }}" class="btn btn-outline-secondary mb-2">
                    <i class="bi bi-terminal"></i> View Logs
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
